services:
  # Single service serving both frontend and backend
  - type: web
    name: music-marketplace
    env: docker
    plan: starter
    branch: main
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: '["*"]'
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: musicdb
          property: connectionString

databases:
  - name: musicdb
    databaseName: musicdb
    user: musicapp
    plan: starter
