services:
  # Single service serving both frontend and backend
  - type: web
    name: music-marketplace
    env: python
    plan: starter
    branch: main
    buildCommand: |
      pip install -r backend/requirements.txt && \
      cd frontend && npm install && npm run build
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: '["*"]'
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: musicdb
          property: connectionString

databases:
  - name: musicdb
    databaseName: musicdb
    user: musicapp
    plan: starter
