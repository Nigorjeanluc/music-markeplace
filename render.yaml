services:
  # Backend API (Python)
  - type: web
    name: music-market-backend
    env: python
    plan: starter
    branch: main
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: '["https://music-marketplace-frontend.onrender.com"]'
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: musicdb
          property: connectionString

  # Frontend (Static Site)
  - type: web
    name: music-marketplace-frontend
    env: static
    plan: starter
    branch: main
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://music-market-backend.onrender.com

databases:
  - name: musicdb
    databaseName: musicdb
    user: musicapp
    plan: starter
