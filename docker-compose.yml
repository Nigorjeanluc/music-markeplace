services:
  db:
    image: postgres:16-alpine
    container_name: music_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: musicapp
      POSTGRES_PASSWORD: musicapp123
      POSTGRES_DB: musicdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musicapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: music_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://musicapp:musicapp123@db:5432/musicdb
      DATABASE_URL_TEST: postgresql://musicapp:musicapp123@db:5432/musicdb_test
      SECRET_KEY: your-super-secret-key-change-this-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      ENVIRONMENT: development
      DEBUG: "True"
    ports:
      # Host port 8001 avoids conflict with local dev on 8000
      - "8001:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "
        alembic upgrade head &&
        python -m app.db.seed &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  frontend:
    image: node:20-alpine
    container_name: music_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # Host port 5174 avoids conflict with local dev on 5173
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    environment:
      # Points to backend as accessed from the browser (host machine)
      - VITE_API_URL=http://localhost:8001
    command: sh -c "yarn install && yarn dev --host"

volumes:
  postgres_data: